name: Release

on:
  push:
    branches:
      - master
      - main
  # Allow manual runs from the Actions tab. Useful when a push event is dropped
  # (GitHub occasionally fails to deliver a push webhook) or to re-run against
  # the current HEAD without crafting an empty commit.
  workflow_dispatch:

# OIDC is required for npm Trusted Publishing (tokenless). contents:write lets
# semantic-release push the release commit/tag and create the GitHub release.
permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    env:
      # Disable husky for the entire CI job. Two reasons:
      # 1. The `prepare` script (`husky install`) runs during `pnpm install` and
      #    sets up hooks we never want firing in CI.
      # 2. @semantic-release/git commits `chore(release): ... [skip ci]`; without
      #    HUSKY=0 the commit-msg (commitlint) hook fires and fails because
      #    commitlint can't be fetched in CI, crashing the release at prepare.
      HUSKY: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        # Version is read from the `packageManager` field in package.json
        # (single source of truth). Do not add `version:` here.
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Validate exports
        run: pnpm validate:exports

      - name: Test exports
        run: pnpm test:exports

      - name: Lint package
        run: pnpm lint:package

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
