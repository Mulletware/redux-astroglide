name: CI

on:
  pull_request:
    branches:
      - master
      - main
  push:
    branches-ignore:
      - master
      - main

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - uses: pnpm/action-setup@v2
        name: Install pnpm
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Validate exports sync
        run: node scripts/sync-exports.js --check

      - name: Validate exports exist
        run: pnpm validate:exports

      - name: Test exports are importable
        run: pnpm test:exports

      - name: Lint package.json
        run: pnpm lint:package

      - name: Verify package contents
        run: npm pack --dry-run
