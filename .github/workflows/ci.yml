name: CI

on:
  pull_request:
    branches:
      - master
      - main
  push:
    branches-ignore:
      - master
      - main

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    env:
      # Disable husky in CI — the `prepare` script (husky install) runs during
      # `pnpm install` and we never want commit hooks firing in CI.
      HUSKY: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        # Version is read from the `packageManager` field in package.json
        # (single source of truth). Do not add `version:` here.
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Validate exports sync
        run: node scripts/sync-exports.js --check

      - name: Validate exports exist
        run: pnpm validate:exports

      - name: Test exports are importable
        run: pnpm test:exports

      - name: Lint package.json
        run: pnpm lint:package

      - name: Verify package contents
        run: npm pack --dry-run
