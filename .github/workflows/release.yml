name: Release

on:
  push:
    branches:
      - master
      - main

# OIDC is required for npm Trusted Publishing (tokenless). contents:write lets
# semantic-release push the release commit/tag and create the GitHub release.
permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Validate exports
        run: pnpm validate:exports

      - name: Test exports
        run: pnpm test:exports

      - name: Lint package
        run: pnpm lint:package

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
